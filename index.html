<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login/Signup</title>
  <base href="/waypoint/">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.14/antd.min.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <h1 class="title">Waypoint Dashboard</h1>
    <div class="form-card">
      <div class="tabs">
        <button class="tab-button active" onclick="showTab('login')">Login</button>
        <button class="tab-button" onclick="showTab('signup')">Signup</button>
      </div>
      <div id="login" class="tab-content active">
        <form onsubmit="handleLogin(event)">
          <input type="email" placeholder="Email" required>
          <input type="password" placeholder="Password" required>
          <button type="submit" class="ant-btn ant-btn-primary">Login</button>
          <a href="#" class="link">Forgot Password?</a>
          <div>
            <button class="btn-sso">Google SSO</button>
            <button class="btn-sso">Email SSO</button>
          </div>
        </form>
      </div>
      <div id="signup" class="tab-content">
        <form onsubmit="handleSignup(event)">
          <input type="text" placeholder="Full Name" required>
          <input type="email" placeholder="Email" required>
          <input type="password" placeholder="Password" required>
          <input type="password" placeholder="Confirm Password" required>
          <button type="submit" class="ant-btn ant-btn-primary">Signup</button>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.14/antd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
